services:

  pgm_app:
    image: php:8.4-fpm
    container_name: pgm_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    networks:
      - ovhgra1
    command: >
      sh -c "
        apt-get update -q && apt-get install -y libpq-dev libsqlite3-dev unzip zip git -q &&
        docker-php-ext-install pdo pdo_pgsql pdo_sqlite &&
        curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer &&
        composer install --no-dev --optimize-autoloader &&
        mkdir -p /var/www/html/storage/twig_cache &&
        chown -R www-data:www-data /var/www/html/storage &&
        php-fpm
      "

  pgm_nginx:
    image: nginx:1.25-alpine
    container_name: pgm_nginx
    #ports:
    #  - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - pgm_app
    networks:
      - ovhgra1

networks:
  ovhgra1:
    external: true
